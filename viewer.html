<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEYBLADE X — 賽程表 觀眾</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #050507;
  --surface: #0d0d12;
  --surface2: #13131a;
  --border: #2a1a1a;
  --red: #e8001a;
  --red2: #ff3344;
  --redglow: rgba(232,0,26,0.35);
  --chrome: #c8ccd4;
  --chrome2: #8a8f9a;
  --gold: #ffd700;
  --win: #00e676;
  --lose: #ff1744;
  --text: #eeeef5;
  --muted: #55556a;
  --radius: 6px;
  --font-head: 'Orbitron', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(232,0,26,0.12) 0%, transparent 70%),
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(232,0,26,0.015) 40px,
      rgba(232,0,26,0.015) 41px
    );
}

/* ── HEADER ── */
header {
  position: relative;
  padding: 2.2rem 2rem 1.6rem;
  text-align: center;
  overflow: hidden;
  border-bottom: 1px solid rgba(232,0,26,0.3);
  background: linear-gradient(180deg, #0a0006 0%, var(--bg) 100%);
}

header::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 50% 0%, rgba(232,0,26,0.2) 0%, transparent 70%);
  pointer-events: none;
}

/* spinning X rings behind title */
.bey-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(232,0,26,0.15);
  pointer-events: none;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.bey-ring:nth-child(1) { width: 300px; height: 300px; animation: spin 12s linear infinite; }
.bey-ring:nth-child(2) { width: 220px; height: 220px; border-color: rgba(200,204,212,0.1); animation: spin 8s linear infinite reverse; }
.bey-ring:nth-child(3) { width: 140px; height: 140px; animation: spin 5s linear infinite; }
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

.bey-ring::after {
  content: '';
  position: absolute;
  width: 6px; height: 6px;
  background: var(--red);
  border-radius: 50%;
  top: 0; left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 8px var(--red);
}

header h1 {
  position: relative;
  font-family: var(--font-head);
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  color: #fff;
  text-shadow:
    0 0 20px var(--redglow),
    0 0 60px rgba(232,0,26,0.2);
}

header h1 span.x-letter {
  color: var(--red);
  text-shadow: 0 0 15px var(--red), 0 0 40px var(--red);
}

header .subtitle {
  position: relative;
  margin-top: 0.5rem;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  color: var(--chrome2);
  text-transform: uppercase;
}

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0;
  gap: 0;
  position: relative;
}

.tab {
  padding: 0.9rem 2rem;
  cursor: pointer;
  color: var(--muted);
  font-family: var(--font-head);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 100%, 0 100%);
}

.tab.active {
  color: var(--red);
  border-bottom-color: var(--red);
  background: rgba(232,0,26,0.06);
}

.tab:hover:not(.active) { color: var(--chrome); }

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 1rem;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: flex-end;
  position: relative;
}

.controls::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--red), transparent);
}

.ctrl-group { display: flex; flex-direction: column; gap: 0.35rem; }

.ctrl-group label {
  font-size: 0.65rem;
  color: var(--red);
  font-family: var(--font-mono);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

input, select {
  background: #0a0a10;
  border: 1px solid #2a1a1a;
  color: var(--text);
  padding: 0.5rem 0.8rem;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: var(--font-body);
  font-weight: 600;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, select:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 2px rgba(232,0,26,0.15);
}

/* ── BUTTONS ── */
.btn {
  padding: 0.55rem 1.4rem;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-head);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  pointer-events: none;
}

.btn-primary {
  background: linear-gradient(135deg, #c20016, var(--red));
  color: #fff;
  box-shadow: 0 0 15px rgba(232,0,26,0.4);
}
.btn-primary:hover { box-shadow: 0 0 25px rgba(232,0,26,0.6); transform: translateY(-1px); }

.btn-secondary {
  background: #13131a;
  color: var(--chrome);
  border: 1px solid #2a2a3a;
}
.btn-secondary:hover { border-color: var(--red); color: var(--red); }

.btn-sm { padding: 0.35rem 0.9rem; font-size: 0.65rem; clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%); }

/* ── MATCH CARD (Single elim) ── */
.bracket-wrap { overflow-x: auto; padding-bottom: 1rem; }

.bracket {
  display: flex;
  gap: 2.5rem;
  min-width: max-content;
  align-items: flex-start;
  padding: 1.5rem;
}

.round-col { display: flex; flex-direction: column; }

.round-label {
  text-align: center;
  font-family: var(--font-head);
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  padding: 0.3rem 0.6rem;
  background: rgba(232,0,26,0.08);
  border: 1px solid rgba(232,0,26,0.2);
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}

.match-slot { display: flex; flex-direction: column; position: relative; }

.match-card {
  width: 220px;
  background: var(--surface);
  border: 1px solid #1e1e28;
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}

.match-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--border);
  transition: background 0.2s;
}

.match-card:hover { border-color: rgba(232,0,26,0.3); }
.match-card:hover::before { background: var(--red); }

.match-card.completed { border-color: rgba(0,230,118,0.2); }
.match-card.completed::before { background: var(--win); }

.player-row {
  display: flex;
  align-items: center;
  padding: 0.5rem 0.7rem 0.5rem 0.9rem;
  gap: 0.5rem;
  font-size: 0.9rem;
  font-weight: 600;
  border-bottom: 1px solid #1a1a24;
  transition: background 0.15s;
}

.player-row:last-of-type { border-bottom: none; }

.player-row.winner {
  background: rgba(0,230,118,0.06);
  color: var(--win);
}
.player-row.loser {
  opacity: 0.45;
}

.player-seed {
  width: 22px; height: 22px;
  background: #0a0a14;
  border: 1px solid #2a2a3a;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--red);
  flex-shrink: 0;
}

.player-name { flex: 1; font-family: var(--font-body); font-weight: 700; }
.tbd { color: var(--muted); font-style: italic; font-size: 0.8rem; }

.player-score {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: 1rem;
  min-width: 22px;
  text-align: right;
}

/* score buttons */
.score-btn-row {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 4px 6px;
  border-top: 1px solid #1a1a24;
  background: rgba(0,0,0,0.3);
}

.score-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--red);
  min-width: 18px;
  flex-shrink: 0;
  font-weight: 700;
}

.sc-btn {
  padding: 2px 7px;
  background: #0a0a14;
  border: 1px solid #2a1a1a;
  border-radius: 3px;
  color: var(--chrome);
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-mono);
  transition: all 0.12s;
  clip-path: polygon(3px 0%, 100% 0%, calc(100% - 3px) 100%, 0% 100%);
}
.sc-btn:hover { background: rgba(232,0,26,0.15); border-color: var(--red); color: var(--red); }
.sc-btn:active { transform: scale(0.92); }
.sc-reset { color: var(--muted); font-size: 0.65rem; }
.sc-reset:hover { color: var(--lose); border-color: var(--lose); }

/* ── SWISS TABLE ── */
.swiss-wrap { display: flex; flex-direction: column; gap: 1.2rem; padding: 1.5rem; }

.round-section {
  background: var(--surface);
  border: 1px solid #1e1e28;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}

.round-section::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--red), transparent);
}

.round-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 1rem 0.7rem 1.3rem;
  background: rgba(232,0,26,0.06);
  border-bottom: 1px solid #1e1e28;
}

.round-title {
  font-family: var(--font-head);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.match-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }

.match-table th {
  padding: 0.55rem 1rem;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 1px solid #1e1e28;
  background: rgba(0,0,0,0.2);
}

.match-table td {
  padding: 0.6rem 1rem;
  border-bottom: 1px solid rgba(30,30,40,0.5);
  vertical-align: middle;
  font-weight: 600;
}

.match-table tr:last-child td { border-bottom: none; }
.match-table tr:hover td { background: rgba(232,0,26,0.03); }

.vs-badge {
  display: inline-block;
  padding: 0.1rem 0.5rem;
  background: rgba(232,0,26,0.1);
  border: 1px solid rgba(232,0,26,0.3);
  color: var(--red);
  border-radius: 3px;
  font-family: var(--font-head);
  font-size: 0.65rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
}

/* ── STANDINGS ── */
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid #1e1e28;
}

.standings-table th {
  padding: 0.65rem 1rem;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid #1e1e28;
}

.standings-table td {
  padding: 0.65rem 1rem;
  border-bottom: 1px solid rgba(30,30,40,0.5);
  font-weight: 600;
}

.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr:hover td { background: rgba(232,0,26,0.03); }

.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  border-radius: 3px;
  font-family: var(--font-head);
  font-size: 0.72rem;
  font-weight: 900;
}
.rank-1 .rank-badge { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.4); }
.rank-2 .rank-badge { background: rgba(192,192,192,0.1); color: #c0c0c0; border: 1px solid rgba(192,192,192,0.3); }
.rank-3 .rank-badge { background: rgba(205,127,50,0.1); color: #cd7f32; border: 1px solid rgba(205,127,50,0.3); }

.record .w { color: var(--win); }
.record .l { color: var(--lose); }

.elim-tag {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 0.1rem 0.45rem;
  background: rgba(255,23,68,0.1);
  border: 1px solid rgba(255,23,68,0.3);
  color: var(--lose);
  border-radius: 3px;
  letter-spacing: 0.06em;
}

.active-tag {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 0.1rem 0.45rem;
  background: rgba(0,230,118,0.08);
  border: 1px solid rgba(0,230,118,0.25);
  color: var(--win);
  border-radius: 3px;
}

/* ── CHAMPION BANNER ── */
.champion-banner {
  background: linear-gradient(135deg, rgba(232,0,26,0.1) 0%, rgba(255,215,0,0.08) 100%);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: var(--radius);
  padding: 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.champion-banner::before {
  content: 'X';
  position: absolute;
  font-family: var(--font-head);
  font-size: 15rem;
  font-weight: 900;
  color: rgba(232,0,26,0.04);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
  line-height: 1;
}

.champion-banner .trophy { font-size: 2.5rem; margin-bottom: 0.4rem; }
.champion-banner .champ-name {
  font-family: var(--font-head);
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
  letter-spacing: 0.1em;
}
.champion-banner .champ-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--red);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}

/* ── INFO BOX ── */
.info-box {
  background: rgba(232,0,26,0.04);
  border: 1px solid rgba(232,0,26,0.15);
  border-radius: var(--radius);
  padding: 0.9rem 1.1rem;
  font-size: 0.82rem;
  color: var(--chrome2);
  line-height: 1.7;
  margin-bottom: 1.2rem;
  font-family: var(--font-body);
}

.section-title {
  font-family: var(--font-head);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.section-title::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
  border-radius: 2px;
  display: block;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a1a1a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--red); }

/* ── RESULT INDICATOR ── */
.result-btn {
  padding: 0.2rem 0.7rem;
  border: 1px solid #2a1a1a;
  background: #0a0a14;
  color: var(--chrome);
  border-radius: 3px;
  font-size: 0.75rem;
  cursor: pointer;
  font-family: var(--font-mono);
  font-weight: 700;
  transition: all 0.15s;
}
.result-btn:hover { border-color: var(--red); color: var(--red); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .controls { flex-direction: column; }
  header h1 { font-size: 1.6rem; }
  .match-card { width: 180px; }
  .player-row { font-size: 0.82rem; padding: 0.4rem 0.6rem; }
}

  .score-btn-row{display:none!important}
  .sc-btn{display:none!important}
  .controls{display:none!important}
  .tabs{pointer-events:none}
  #live-bar{
    display:flex;align-items:center;gap:8px;
    padding:0.4rem 1.5rem;background:#070709;
    border-bottom:1px solid #1a0a0a;
    font-family:var(--font-mono);font-size:0.72rem;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--win);flex-shrink:0;
    animation:livep 1.5s ease-in-out infinite;
  }
  @keyframes livep{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.6)}50%{box-shadow:0 0 0 5px rgba(0,230,118,0)}}
  .viewer-badge{
    display:inline-flex;align-items:center;gap:4px;
    background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.25);
    color:var(--win);border-radius:3px;
    padding:0.15rem 0.6rem;
    font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.1em;
    clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
  }
</style>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyAwQKN-ik2LuUHnDwbY2Xh5lVIsQDw0gLQ",authDomain:"beyblade-x-9fd7c.firebaseapp.com",databaseURL:"https://beyblade-x-9fd7c-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"beyblade-x-9fd7c",storageBucket:"beyblade-x-9fd7c.firebasestorage.app",messagingSenderId:"167133820929",appId:"1:167133820929:web:f07c3fccd97e20a03c6800"};
const app=initializeApp(cfg);const db=getDatabase(app);
onValue(ref(db,'tournament'),(snap)=>{
  const data=snap.val();
  if(!data){
    document.getElementById('app').innerHTML='<div style="text-align:center;padding:4rem;color:var(--muted);font-family:var(--font-mono);letter-spacing:0.15em">⏳ WAITING FOR HOST…</div>';
    return;
  }
  document.getElementById('live-msg').textContent='LIVE · '+new Date(data.ts).toLocaleTimeString('zh-TW');
  currentTab=data.tab||'single';
  singleState=data.singleState||null;
  swissState=data.swissState||null;
  document.getElementById('winScoreDisplay').textContent=data.winScore;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&currentTab==='single')||(i===1&&currentTab==='swiss')));
  if(currentTab==='single'&&singleState)renderSingle();
  else if(currentTab==='swiss'&&swissState)renderSwiss();
});
</script>
</head>
<body>
<header>
  <div class="bey-ring"></div>
  <div class="bey-ring"></div>
  <div class="bey-ring"></div>
  <h1>BEYBLADE <span class="x-letter">X</span></h1>
  <div class="subtitle">◆ TOURNAMENT SYSTEM ◆ LIVE VIEW ◆</div>
</header>
<div id="live-bar">
  <div class="live-dot"></div>
  <span id="live-msg" style="color:var(--muted)">CONNECTING…</span>
  <span style="margin-left:auto;color:var(--muted)">WIN SCORE: <strong id="winScoreDisplay" style="color:var(--red);font-family:var(--font-head)">—</strong></span>
  <span class="viewer-badge" style="margin-left:0.8rem">👁 VIEWER</span>
</div>
<div class="tabs">
  <div class="tab active">▶ SINGLE ELIM</div>
  <div class="tab">◈ SWISS ROUND</div>
</div>
<div class="controls" style="display:none">
  <input type="number" id="winScore" value="4"/>
  <input type="number" id="customCount"/>
  <select id="playerCount"><option value="8">8</option></select>
</div>
<div id="app">
  <div style="text-align:center;padding:4rem 2rem;color:var(--muted)">
    <div style="font-family:var(--font-head);font-size:3rem;color:rgba(232,0,26,0.15);letter-spacing:0.1em">X</div>
    <div style="font-family:var(--font-mono);font-size:0.8rem;letter-spacing:0.15em;margin-top:0.5rem">WAITING FOR HOST…</div>
  </div>
</div>
<script>
let currentTab = 'single';
let numPlayers = 8;
let players = [];
let singleState = null;
let swissState = null;
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='single')||(i===1&&tab==='swiss')));
  renderCurrent();
}

function getCount() {
  const c = parseInt(document.getElementById('customCount').value);
  if (c && c >= 2 && c % 2 === 0) return c;
  return parseInt(document.getElementById('playerCount').value);
}

function updateCount() {
  numPlayers = getCount();
}

function initPlayers(n) {
  players = Array.from({length: n}, (_, i) => String(i + 1));
}

function shufflePlayers() {
  const n = getCount();
  if (n % 2 !== 0 || n < 2) { alert('請輸入偶數且 ≥ 2 的人數'); return; }
  initPlayers(n);
  for (let i = players.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [players[i], players[j]] = [players[j], players[i]];
  }
  generate();
}

function generate() {
  numPlayers = getCount();
  if (numPlayers % 2 !== 0 || numPlayers < 2) { alert('請輸入偶數且 ≥ 2 的人數'); return; }
  // Use pre-shuffled order if available and same count, otherwise init fresh
  if (players.length !== numPlayers) initPlayers(numPlayers);
  const shuffled = [...players.slice(0, numPlayers)];
  if (currentTab === 'single') {
    singleState = buildSingle(shuffled);
    renderSingle();
  } else {
    swissState = buildSwiss(shuffled);
    renderSwiss();
  }
}

function resetAll() {
  singleState = null;
  swissState = null;
  players = [];
  document.getElementById('app').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--muted)"><div style="font-size:3rem;margin-bottom:1rem">🏅</div><div style="font-size:1rem">選擇參賽人數後按「產生賽程」開始</div></div>`;
}

function renderCurrent() {
  if (currentTab === 'single' && singleState) renderSingle();
  else if (currentTab === 'swiss' && swissState) renderSwiss();
  else resetAll();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============ SINGLE ELIMINATION ============
function buildSingle(ps) {
  const n = ps.length;
  const rounds = Math.log2(n);
  const r0 = [];
  for (let i = 0; i < n; i += 2) {
    r0.push({ a: ps[i], b: ps[i+1], winner: null, loser: null });
  }
  const allRounds = [r0];
  for (let r = 1; r < rounds; r++) {
    const prev = allRounds[r-1];
    const next = [];
    for (let i = 0; i < prev.length; i += 2) {
      next.push({ a: null, b: null, winner: null, loser: null, srcA: [r-1,i], srcB: [r-1,i+1] });
    }
    allRounds.push(next);
  }
  return { rounds: allRounds, champion: null };
}

function propagateSingle() {
  const s = singleState;
  for (let r = 1; r < s.rounds.length; r++) {
    for (let m = 0; m < s.rounds[r].length; m++) {
      const match = s.rounds[r][m];
      const [ra, ma] = match.srcA;
      const [rb, mb] = match.srcB;
      match.a = s.rounds[ra][ma].winner;
      match.b = s.rounds[rb][mb].winner;
      if (match.a && match.b && match.winner) {} // keep winner if already set
    }
  }
  const last = s.rounds[s.rounds.length-1][0];
  s.champion = last.winner;
}

function renderSingle() {
  propagateSingle();
  const s = singleState;
  const roundNames = ['第一輪','第二輪','準決賽','決賽','冠軍賽'];
  const n = s.rounds.length;

  let html = '';

  if (s.champion) {
    html += `<div class="champion-banner">
      <div class="trophy">🏆</div>
      <div class="name">${s.champion}</div>
      <div class="label">冠軍</div>
    </div>`;
  }

  html += '<div class="bracket-wrap"><div class="bracket">';

  s.rounds.forEach((round, ri) => {
    const rName = roundNames[Math.min(ri, n-1)] || `第 ${ri+1} 輪`;
    const finalName = n === 1 ? '決賽' : (ri === n-1 ? '決賽' : rName);
    const totalSlots = Math.pow(2, n - ri - 1);
    const slotH = 110; // each match card height + gap (taller with score buttons)
    const totalH = slotH * Math.pow(2, n - ri);
    const spacing = totalH / round.length;

    html += `<div class="round-col">
      <div class="round-label">${ri === n-1 ? '🏆 決賽' : finalName}</div>`;

    round.forEach((match, mi) => {
      const aWin = match.winner === match.a && match.winner;
      const bWin = match.winner === match.b && match.winner;
      const canScore = match.a && match.b && !match.winner;
      const sa = match.scoreA || 0;
      const sb = match.scoreB || 0;
      html += `<div class="match-slot" style="height:${spacing}px;justify-content:center">
        <div class="match-card ${match.winner ? 'completed' : ''}">
          <div class="player-row ${aWin ? 'winner' : (match.winner && !aWin ? 'loser' : '')}">
            <div class="player-seed">${match.a || '-'}</div>
            <div class="player-name ${!match.a ? 'tbd' : ''}">${match.a || 'TBD'}</div>
            <div class="player-score" style="color:${aWin ? 'var(--win)' : sa > 0 ? 'var(--text)' : 'var(--muted)'}">${sa}</div>
          </div>
          <div class="player-row ${bWin ? 'winner' : (match.winner && !bWin ? 'loser' : '')}">
            <div class="player-seed">${match.b || '-'}</div>
            <div class="player-name ${!match.b ? 'tbd' : ''}">${match.b || 'TBD'}</div>
            <div class="player-score" style="color:${bWin ? 'var(--win)' : sb > 0 ? 'var(--text)' : 'var(--muted)'}">${sb}</div>
          </div>
          ${canScore ? `<div class="score-btn-row">
            <span class="score-label">${match.a}</span>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'a',1)">+1</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'a',2)">+2</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'a',3)">+3</button>
          </div>
          <div class="score-btn-row">
            <span class="score-label">${match.b}</span>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'b',1)">+1</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'b',2)">+2</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'b',3)">+3</button>
          </div>
          <div class="score-btn-row" style="justify-content:flex-end;padding:2px 6px 4px">
            <button class="sc-btn sc-reset" onclick="resetScore('single',${ri},${mi})">↺ 清零</button>
          </div>` : ''}
        </div>
      </div>`;
    });

    html += '</div>';
  });

  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
}

function getWinScore() {
  return parseInt(document.getElementById('winScore').value) || 11;
}

function addScore(type, ri, mi, side, pts) {
  const match = type === 'single' ? singleState.rounds[ri][mi] : swissState.rounds[ri][mi];
  if (match.winner) return;
  if (side === 'a') match.scoreA = (match.scoreA || 0) + pts;
  else match.scoreB = (match.scoreB || 0) + pts;

  const ws = getWinScore();
  if (match.scoreA >= ws) {
    match.winner = match.a; match.loser = match.b;
    if (type === 'swiss') { swissState.standings[match.a].wins++; swissState.standings[match.b].losses++; if (swissState.standings[match.b].losses >= 2) swissState.standings[match.b].eliminated = true; advanceSwissRound(); }
  } else if (match.scoreB >= ws) {
    match.winner = match.b; match.loser = match.a;
    if (type === 'swiss') { swissState.standings[match.b].wins++; swissState.standings[match.a].losses++; if (swissState.standings[match.a].losses >= 2) swissState.standings[match.a].eliminated = true; advanceSwissRound(); }
  }

  if (type === 'single') renderSingle(); else renderSwiss();
}

function resetScore(type, ri, mi) {
  const match = type === 'single' ? singleState.rounds[ri][mi] : swissState.rounds[ri][mi];
  match.scoreA = 0; match.scoreB = 0;
  if (type === 'single') renderSingle(); else renderSwiss();
}

// ============ SWISS ROUND (Double Elimination style) ============
function buildSwiss(ps) {
  const standings = {};
  ps.forEach(p => { standings[p] = { wins: 0, losses: 0, eliminated: false }; });

  const r0 = [];
  for (let i = 0; i < ps.length; i += 2) {
    r0.push({ a: ps[i], b: ps[i+1], winner: null, loser: null });
  }

  return {
    players: [...ps],
    standings,
    rounds: [r0],
    currentRound: 0,
    champion: null
  };
}

function advanceSwissRound() {
  const s = swissState;
  const curRound = s.rounds[s.currentRound];
  const allDone = curRound.every(m => m.winner);
  if (!allDone) return;

  // Check active players
  const active = s.players.filter(p => !s.standings[p].eliminated);

  if (active.length === 1) {
    s.champion = active[0];
    return;
  }

  if (active.length === 0) { s.champion = '平局'; return; }

  // Sort by wins desc, losses asc
  active.sort((a, b) => {
    const sa = s.standings[a], sb = s.standings[b];
    if (sb.wins !== sa.wins) return sb.wins - sa.wins;
    return sa.losses - sb.losses;
  });

  // Pair them up; if odd active, the top player gets a bye (auto-win)
  const next = [];
  const pool = [...active];
  if (pool.length % 2 !== 0) pool.push(null); // bye

  for (let i = 0; i < pool.length; i += 2) {
    if (!pool[i+1]) {
      // bye for pool[i]
      next.push({ a: pool[i], b: '輪空', winner: pool[i], loser: '輪空', bye: true });
      s.standings[pool[i]].wins++;
    } else {
      next.push({ a: pool[i], b: pool[i+1], winner: null, loser: null });
    }
  }

  s.rounds.push(next);
  s.currentRound++;
}

function renderSwiss() {
  const s = swissState;
  let html = '';

  if (s.champion) {
    html += `<div class="champion-banner">
      <div class="trophy">🏆</div>
      <div class="name">${s.champion}</div>
      <div class="label">冠軍（最後存活者）</div>
    </div>`;
  }

  html += `<div class="info-box">
    📋 <strong>瑞士輪（雙敗淘汰）規則：</strong><br>
    每位選手累積 <strong>2 次敗場</strong> 即淘汰。每輪依勝場數分組配對，勝者對勝者、敗者對敗者。最後剩餘選手為冠軍。
  </div>`;

  // Standings
  html += `<div class="section-title"><div class="dot"></div>積分排行</div>`;
  const sorted = [...s.players].sort((a, b) => {
    const sa = s.standings[a], sb = s.standings[b];
    if (sb.wins !== sa.wins) return sb.wins - sa.wins;
    return sa.losses - sb.losses;
  });

  html += `<table class="standings-table" style="margin-bottom:1.5rem">
    <thead><tr>
      <th style="width:40px">名次</th>
      <th>選手</th>
      <th>勝 / 敗</th>
      <th>狀態</th>
    </tr></thead><tbody>`;

  sorted.forEach((p, i) => {
    const st = s.standings[p];
    const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    html += `<tr class="${cls}">
      <td style="font-weight:800">#${i+1}</td>
      <td>${p}</td>
      <td class="record"><span class="w">${st.wins}W</span> <span style="color:var(--muted)">/</span> <span class="l">${st.losses}L</span></td>
      <td>${st.eliminated ? '<span class="eliminated-tag">已淘汰</span>' : '<span class="active-tag">進行中</span>'}</td>
    </tr>`;
  });

  html += `</tbody></table>`;

  // Rounds
  html += `<div class="swiss-wrap">`;
  s.rounds.forEach((round, ri) => {
    const allDone = round.every(m => m.winner);
    html += `<div class="round-section">
      <div class="round-header">
        <div class="round-title">第 ${ri+1} 輪</div>
        <span style="font-size:0.78rem;color:${allDone ? 'var(--win)' : 'var(--muted)'}">
          ${allDone ? '✓ 已完成' : `${round.filter(m=>m.winner).length}/${round.length} 完成`}
        </span>
      </div>
      <table class="match-table">
        <thead><tr><th>#</th><th>選手 A</th><th></th><th>選手 B</th><th>結果</th></tr></thead>
        <tbody>`;

    round.forEach((match, mi) => {
      const aWin = match.winner === match.a;
      const bWin = match.winner === match.b;
      const bye = match.bye;
      const sa = match.scoreA || 0;
      const sb = match.scoreB || 0;
      html += `<tr>
        <td style="color:var(--muted);font-size:0.8rem">${mi+1}</td>
        <td style="font-weight:${aWin?'700':'400'};color:${aWin?'var(--win)':'var(--text)'}">
          ${match.a}
          ${!match.winner && !bye ? `<span style="font-size:0.82rem;color:${sa>0?'var(--accent)':'var(--muted)'};font-weight:700;margin-left:4px">${sa}分</span>` : ''}
        </td>
        <td>
          ${match.winner
            ? `<span style="font-size:0.82rem;color:var(--win);font-weight:700">🏅 ${match.winner}${bye ? ' (輪空)' : ''}<br><span style="color:var(--muted);font-size:0.75rem">${sa} : ${sb}</span></span>`
            : bye ? '' : `<div style="display:flex;flex-direction:column;gap:3px;align-items:center">
                <span class="vs-badge">VS</span>
                <button class="sc-btn sc-reset" onclick="resetScore('swiss',${ri},${mi})" style="font-size:0.7rem;padding:1px 5px">↺</button>
              </div>`
          }
        </td>
        <td style="font-weight:${bWin?'700':'400'};color:${bWin?'var(--win)':bye?'var(--muted)':'var(--text)'}">
          ${match.b}
          ${!match.winner && !bye ? `<span style="font-size:0.82rem;color:${sb>0?'var(--accent)':'var(--muted)'};font-weight:700;margin-left:4px">${sb}分</span>` : ''}
        </td>
        <td>
          ${match.winner
            ? ''
            : bye ? '' : `<div style="display:flex;gap:3px;flex-wrap:wrap">
                <div style="display:flex;gap:2px;align-items:center">
                  <span style="font-size:0.7rem;color:var(--muted);min-width:16px;font-weight:700">${match.a}:</span>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'a',1)">+1</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'a',2)">+2</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'a',3)">+3</button>
                </div>
                <div style="display:flex;gap:2px;align-items:center;margin-top:2px">
                  <span style="font-size:0.7rem;color:var(--muted);min-width:16px;font-weight:700">${match.b}:</span>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'b',1)">+1</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'b',2)">+2</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'b',3)">+3</button>
                </div>
              </div>`
          }
        </td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

function addScore(){}
function resetScore(){}
function shufflePlayers(){}
function generate(){}
function resetAll(){}
</script>
</body>
</html>
