<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賽程表 — 觀眾</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --win: #22c55e;
    --lose: #ef4444;
    --text: #e8e8f0;
    --muted: #7070a0;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, rgba(108,99,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, #6c63ff, #ff6b9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
  }

  header p {
    color: var(--muted);
    margin-top: 0.4rem;
    font-size: 0.9rem;
  }

  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
  }

  .tab {
    padding: 1rem 1.5rem;
    cursor: pointer;
    color: var(--muted);
    font-weight: 600;
    font-size: 0.95rem;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab:hover:not(.active) { color: var(--text); }

  .controls {
    display: flex;
    gap: 1rem;
    padding: 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .ctrl-group label {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.55rem 0.9rem;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--accent); }

  .btn {
    padding: 0.6rem 1.4rem;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9b59b6);
    color: #fff;
  }

  .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent); }

  .btn-sm {
    padding: 0.3rem 0.7rem;
    font-size: 0.78rem;
  }

  #app { padding: 1.5rem; }

  /* Single Elimination Bracket */
  .bracket-wrap {
    overflow-x: auto;
    padding-bottom: 1rem;
  }

  .bracket {
    display: flex;
    gap: 2.5rem;
    min-width: max-content;
    align-items: flex-start;
    padding: 1rem 0;
  }

  .round-col {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .round-label {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    padding: 0.3rem 0.6rem;
    background: rgba(108,99,255,0.1);
    border-radius: 20px;
  }

  .match-slot {
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .match-card {
    width: 210px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .match-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(108,99,255,0.2);
  }

  .match-card.completed { border-color: rgba(34,197,94,0.3); }

  .player-row {
    display: flex;
    align-items: center;
    padding: 0.5rem 0.65rem;
    gap: 0.5rem;
    font-size: 0.88rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    position: relative;
  }

  .player-row:last-child { border-bottom: none; }

  .player-row.winner {
    background: rgba(34,197,94,0.08);
    color: var(--win);
    font-weight: 700;
  }

  .player-row.loser {
    background: rgba(239,68,68,0.05);
    color: var(--muted);
  }

  .player-seed {
    width: 18px; height: 18px;
    background: var(--surface2);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }

  .player-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .player-score {
    font-weight: 800;
    font-size: 1rem;
    min-width: 20px;
    text-align: right;
  }

  .tbd { color: var(--muted); font-style: italic; font-size: 0.82rem; }

  /* Swiss Round Table */
  .swiss-wrap { display: flex; flex-direction: column; gap: 1.5rem; }

  .round-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .round-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1.2rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .round-title {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .match-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  .match-table th {
    padding: 0.6rem 1rem;
    text-align: left;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .match-table td {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid rgba(42,42,61,0.5);
    vertical-align: middle;
  }

  .match-table tr:last-child td { border-bottom: none; }

  .match-table tr:hover td { background: rgba(108,99,255,0.04); }

  .vs-badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    background: rgba(108,99,255,0.15);
    color: var(--accent);
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.05em;
  }

  .result-btn {
    padding: 0.2rem 0.55rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.15s;
  }

  .result-btn:hover { border-color: var(--accent); color: var(--accent); }
  .result-btn.selected-a { background: rgba(34,197,94,0.15); border-color: var(--win); color: var(--win); }
  .result-btn.selected-b { background: rgba(239,68,68,0.1); border-color: var(--lose); color: var(--lose); }

  /* Standings */
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .standings-table th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--surface2);
  }

  .standings-table td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(42,42,61,0.5);
  }

  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: rgba(108,99,255,0.04); }

  .rank-1 td:first-child { color: var(--gold); font-weight: 800; }
  .rank-2 td:first-child { color: var(--silver); font-weight: 700; }
  .rank-3 td:first-child { color: #cd7f32; font-weight: 700; }

  .record { font-weight: 700; }
  .record .w { color: var(--win); }
  .record .l { color: var(--lose); }

  .eliminated-tag {
    display: inline-block;
    font-size: 0.68rem;
    padding: 0.1rem 0.4rem;
    background: rgba(239,68,68,0.12);
    color: var(--lose);
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .active-tag {
    display: inline-block;
    font-size: 0.68rem;
    padding: 0.1rem 0.4rem;
    background: rgba(34,197,94,0.12);
    color: var(--win);
    border-radius: 4px;
    font-weight: 600;
  }

  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    min-width: 300px;
    max-width: 400px;
    width: 90%;
  }

  .modal h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
    color: var(--text);
  }

  .winner-select {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    margin-bottom: 1.2rem;
  }

  .winner-opt {
    padding: 0.8rem 1rem;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.95rem;
    font-family: inherit;
    color: var(--text);
    font-weight: 600;
    transition: all 0.15s;
    text-align: left;
  }

  .winner-opt:hover {
    border-color: var(--accent);
    background: rgba(108,99,255,0.1);
    color: var(--accent);
  }

  .winner-opt.picked {
    border-color: var(--win);
    background: rgba(34,197,94,0.1);
    color: var(--win);
  }

  .name-inputs {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
    max-height: 300px;
    overflow-y: auto;
  }

  .name-input-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .name-input-row span {
    width: 28px;
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 700;
    text-align: right;
  }

  .champion-banner {
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.1));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 1.2rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .champion-banner .trophy { font-size: 2rem; margin-bottom: 0.4rem; }
  .champion-banner .name { font-size: 1.4rem; font-weight: 900; color: var(--gold); }
  .champion-banner .label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }

  .info-box {
    background: rgba(108,99,255,0.08);
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .score-btn-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 6px;
    border-top: 1px solid var(--border);
    background: rgba(108,99,255,0.04);
  }

  .score-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 700;
    min-width: 20px;
    flex-shrink: 0;
  }

  .sc-btn {
    padding: 2px 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    line-height: 1.4;
  }

  .sc-btn:hover { background: rgba(108,99,255,0.2); border-color: var(--accent); color: var(--accent); }
  .sc-btn:active { transform: scale(0.93); }

  .sc-reset {
    color: var(--muted);
    font-size: 0.72rem;
  }
  .sc-reset:hover { color: var(--lose); border-color: var(--lose); background: rgba(239,68,68,0.08); }

  @media (max-width: 600px) {
    .controls { flex-direction: column; }
    header h1 { font-size: 1.6rem; }
    .match-card { width: 150px; }
    .player-row { font-size: 0.8rem; padding: 0.4rem 0.5rem; }
  }

  .score-btn-row{display:none!important}
  .sc-btn{display:none!important}
  .controls{display:none!important}
  .tabs{pointer-events:none}
  #live-bar{display:flex;align-items:center;gap:8px;padding:0.5rem 1.5rem;background:var(--surface2);border-bottom:1px solid var(--border);font-size:0.8rem}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--win);flex-shrink:0;animation:livepulse 1.5s ease-in-out infinite}
  @keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}
  .viewer-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--win);border-radius:20px;padding:0.2rem 0.7rem;font-size:0.75rem;font-weight:700}
</style>
<script type="module">
import{ initializeApp }from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{ getDatabase,ref,onValue }from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyAwQKN-ik2LuUHnDwbY2Xh5lVIsQDw0gLQ",authDomain:"beyblade-x-9fd7c.firebaseapp.com",databaseURL:"https://beyblade-x-9fd7c-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"beyblade-x-9fd7c",storageBucket:"beyblade-x-9fd7c.firebasestorage.app",messagingSenderId:"167133820929",appId:"1:167133820929:web:f07c3fccd97e20a03c6800"};
const app=initializeApp(cfg);
const db=getDatabase(app);
onValue(ref(db,'tournament'),(snap)=>{
  const data=snap.val();
  if(!data){document.getElementById('app').innerHTML='<div style="text-align:center;padding:4rem;color:var(--muted)"><div style="font-size:3rem">⏳</div><div>等待主持人產生賽程…</div></div>';return;}
  document.getElementById('live-msg').textContent='即時同步中 · 最後更新 '+new Date(data.ts).toLocaleTimeString('zh-TW');
  currentTab=data.tab||'single';
  singleState=data.singleState||null;
  swissState=data.swissState||null;
  document.getElementById('winScoreDisplay').textContent=data.winScore+' 分';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&currentTab==='single')||(i===1&&currentTab==='swiss')));
  if(currentTab==='single'&&singleState)renderSingle();
  else if(currentTab==='swiss'&&swissState)renderSwiss();
});
</script>
</head>
<body>
<header>
  <h1>⚔ 賽程表系統</h1>
  <p>單淘汰 · 瑞士輪（雙敗淘汰） <span class="viewer-badge">👁 觀眾模式</span></p>
</header>
<div id="live-bar">
  <div class="live-dot"></div>
  <span id="live-msg">等待主持人開始…</span>
  <span style="margin-left:auto;color:var(--muted)">勝利分數：<strong id="winScoreDisplay" style="color:var(--text)">—</strong></span>
</div>
<div class="tabs">
  <div class="tab active">🏆 單淘汰</div>
  <div class="tab">🔄 瑞士輪</div>
</div>
<div class="controls" style="display:none">
  <input type="number" id="winScore" value="4"/>
  <input type="number" id="customCount"/>
  <select id="playerCount"><option value="8">8</option></select>
</div>
<div id="app">
  <div style="text-align:center;padding:4rem;color:var(--muted)"><div style="font-size:3rem">⏳</div><div>等待主持人產生賽程…</div></div>
</div>
<script>
let currentTab = 'single';
let numPlayers = 8;
let players = [];
let singleState = null;
let swissState = null;
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='single')||(i===1&&tab==='swiss')));
  renderCurrent();
}

function getCount() {
  const c = parseInt(document.getElementById('customCount').value);
  if (c && c >= 2 && c % 2 === 0) return c;
  return parseInt(document.getElementById('playerCount').value);
}

function updateCount() {
  numPlayers = getCount();
}

function initPlayers(n) {
  players = Array.from({length: n}, (_, i) => String(i + 1));
}

function shufflePlayers() {
  const n = getCount();
  if (n % 2 !== 0 || n < 2) { alert('請輸入偶數且 ≥ 2 的人數'); return; }
  initPlayers(n);
  for (let i = players.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [players[i], players[j]] = [players[j], players[i]];
  }
  generate();
}

function generate() {
  numPlayers = getCount();
  if (numPlayers % 2 !== 0 || numPlayers < 2) { alert('請輸入偶數且 ≥ 2 的人數'); return; }
  // Use pre-shuffled order if available and same count, otherwise init fresh
  if (players.length !== numPlayers) initPlayers(numPlayers);
  const shuffled = [...players.slice(0, numPlayers)];
  if (currentTab === 'single') {
    singleState = buildSingle(shuffled);
    renderSingle();
  } else {
    swissState = buildSwiss(shuffled);
    renderSwiss();
  }
}

function resetAll() {
  singleState = null;
  swissState = null;
  players = [];
  document.getElementById('app').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--muted)"><div style="font-size:3rem;margin-bottom:1rem">🏅</div><div style="font-size:1rem">選擇參賽人數後按「產生賽程」開始</div></div>`;
}

function renderCurrent() {
  if (currentTab === 'single' && singleState) renderSingle();
  else if (currentTab === 'swiss' && swissState) renderSwiss();
  else resetAll();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============ SINGLE ELIMINATION ============
function buildSingle(ps) {
  const n = ps.length;
  const rounds = Math.log2(n);
  const r0 = [];
  for (let i = 0; i < n; i += 2) {
    r0.push({ a: ps[i], b: ps[i+1], winner: null, loser: null });
  }
  const allRounds = [r0];
  for (let r = 1; r < rounds; r++) {
    const prev = allRounds[r-1];
    const next = [];
    for (let i = 0; i < prev.length; i += 2) {
      next.push({ a: null, b: null, winner: null, loser: null, srcA: [r-1,i], srcB: [r-1,i+1] });
    }
    allRounds.push(next);
  }
  return { rounds: allRounds, champion: null };
}

function propagateSingle() {
  const s = singleState;
  for (let r = 1; r < s.rounds.length; r++) {
    for (let m = 0; m < s.rounds[r].length; m++) {
      const match = s.rounds[r][m];
      const [ra, ma] = match.srcA;
      const [rb, mb] = match.srcB;
      match.a = s.rounds[ra][ma].winner;
      match.b = s.rounds[rb][mb].winner;
      if (match.a && match.b && match.winner) {} // keep winner if already set
    }
  }
  const last = s.rounds[s.rounds.length-1][0];
  s.champion = last.winner;
}

function renderSingle() {
  propagateSingle();
  const s = singleState;
  const roundNames = ['第一輪','第二輪','準決賽','決賽','冠軍賽'];
  const n = s.rounds.length;

  let html = '';

  if (s.champion) {
    html += `<div class="champion-banner">
      <div class="trophy">🏆</div>
      <div class="name">${s.champion}</div>
      <div class="label">冠軍</div>
    </div>`;
  }

  html += '<div class="bracket-wrap"><div class="bracket">';

  s.rounds.forEach((round, ri) => {
    const rName = roundNames[Math.min(ri, n-1)] || `第 ${ri+1} 輪`;
    const finalName = n === 1 ? '決賽' : (ri === n-1 ? '決賽' : rName);
    const totalSlots = Math.pow(2, n - ri - 1);
    const slotH = 110; // each match card height + gap (taller with score buttons)
    const totalH = slotH * Math.pow(2, n - ri);
    const spacing = totalH / round.length;

    html += `<div class="round-col">
      <div class="round-label">${ri === n-1 ? '🏆 決賽' : finalName}</div>`;

    round.forEach((match, mi) => {
      const aWin = match.winner === match.a && match.winner;
      const bWin = match.winner === match.b && match.winner;
      const canScore = match.a && match.b && !match.winner;
      const sa = match.scoreA || 0;
      const sb = match.scoreB || 0;
      html += `<div class="match-slot" style="height:${spacing}px;justify-content:center">
        <div class="match-card ${match.winner ? 'completed' : ''}">
          <div class="player-row ${aWin ? 'winner' : (match.winner && !aWin ? 'loser' : '')}">
            <div class="player-seed">${match.a || '-'}</div>
            <div class="player-name ${!match.a ? 'tbd' : ''}">${match.a || 'TBD'}</div>
            <div class="player-score" style="color:${aWin ? 'var(--win)' : sa > 0 ? 'var(--text)' : 'var(--muted)'}">${sa}</div>
          </div>
          <div class="player-row ${bWin ? 'winner' : (match.winner && !bWin ? 'loser' : '')}">
            <div class="player-seed">${match.b || '-'}</div>
            <div class="player-name ${!match.b ? 'tbd' : ''}">${match.b || 'TBD'}</div>
            <div class="player-score" style="color:${bWin ? 'var(--win)' : sb > 0 ? 'var(--text)' : 'var(--muted)'}">${sb}</div>
          </div>
          ${canScore ? `<div class="score-btn-row">
            <span class="score-label">${match.a}</span>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'a',1)">+1</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'a',2)">+2</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'a',3)">+3</button>
          </div>
          <div class="score-btn-row">
            <span class="score-label">${match.b}</span>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'b',1)">+1</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'b',2)">+2</button>
            <button class="sc-btn" onclick="addScore('single',${ri},${mi},'b',3)">+3</button>
          </div>
          <div class="score-btn-row" style="justify-content:flex-end;padding:2px 6px 4px">
            <button class="sc-btn sc-reset" onclick="resetScore('single',${ri},${mi})">↺ 清零</button>
          </div>` : ''}
        </div>
      </div>`;
    });

    html += '</div>';
  });

  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
}

function getWinScore() {
  return parseInt(document.getElementById('winScore').value) || 11;
}

function addScore(type, ri, mi, side, pts) {
  const match = type === 'single' ? singleState.rounds[ri][mi] : swissState.rounds[ri][mi];
  if (match.winner) return;
  if (side === 'a') match.scoreA = (match.scoreA || 0) + pts;
  else match.scoreB = (match.scoreB || 0) + pts;

  const ws = getWinScore();
  if (match.scoreA >= ws) {
    match.winner = match.a; match.loser = match.b;
    if (type === 'swiss') { swissState.standings[match.a].wins++; swissState.standings[match.b].losses++; if (swissState.standings[match.b].losses >= 2) swissState.standings[match.b].eliminated = true; advanceSwissRound(); }
  } else if (match.scoreB >= ws) {
    match.winner = match.b; match.loser = match.a;
    if (type === 'swiss') { swissState.standings[match.b].wins++; swissState.standings[match.a].losses++; if (swissState.standings[match.a].losses >= 2) swissState.standings[match.a].eliminated = true; advanceSwissRound(); }
  }

  if (type === 'single') renderSingle(); else renderSwiss();
}

function resetScore(type, ri, mi) {
  const match = type === 'single' ? singleState.rounds[ri][mi] : swissState.rounds[ri][mi];
  match.scoreA = 0; match.scoreB = 0;
  if (type === 'single') renderSingle(); else renderSwiss();
}

// ============ SWISS ROUND (Double Elimination style) ============
function buildSwiss(ps) {
  const standings = {};
  ps.forEach(p => { standings[p] = { wins: 0, losses: 0, eliminated: false }; });

  const r0 = [];
  for (let i = 0; i < ps.length; i += 2) {
    r0.push({ a: ps[i], b: ps[i+1], winner: null, loser: null });
  }

  return {
    players: [...ps],
    standings,
    rounds: [r0],
    currentRound: 0,
    champion: null
  };
}

function advanceSwissRound() {
  const s = swissState;
  const curRound = s.rounds[s.currentRound];
  const allDone = curRound.every(m => m.winner);
  if (!allDone) return;

  // Check active players
  const active = s.players.filter(p => !s.standings[p].eliminated);

  if (active.length === 1) {
    s.champion = active[0];
    return;
  }

  if (active.length === 0) { s.champion = '平局'; return; }

  // Sort by wins desc, losses asc
  active.sort((a, b) => {
    const sa = s.standings[a], sb = s.standings[b];
    if (sb.wins !== sa.wins) return sb.wins - sa.wins;
    return sa.losses - sb.losses;
  });

  // Pair them up; if odd active, the top player gets a bye (auto-win)
  const next = [];
  const pool = [...active];
  if (pool.length % 2 !== 0) pool.push(null); // bye

  for (let i = 0; i < pool.length; i += 2) {
    if (!pool[i+1]) {
      // bye for pool[i]
      next.push({ a: pool[i], b: '輪空', winner: pool[i], loser: '輪空', bye: true });
      s.standings[pool[i]].wins++;
    } else {
      next.push({ a: pool[i], b: pool[i+1], winner: null, loser: null });
    }
  }

  s.rounds.push(next);
  s.currentRound++;
}

function renderSwiss() {
  const s = swissState;
  let html = '';

  if (s.champion) {
    html += `<div class="champion-banner">
      <div class="trophy">🏆</div>
      <div class="name">${s.champion}</div>
      <div class="label">冠軍（最後存活者）</div>
    </div>`;
  }

  html += `<div class="info-box">
    📋 <strong>瑞士輪（雙敗淘汰）規則：</strong><br>
    每位選手累積 <strong>2 次敗場</strong> 即淘汰。每輪依勝場數分組配對，勝者對勝者、敗者對敗者。最後剩餘選手為冠軍。
  </div>`;

  // Standings
  html += `<div class="section-title"><div class="dot"></div>積分排行</div>`;
  const sorted = [...s.players].sort((a, b) => {
    const sa = s.standings[a], sb = s.standings[b];
    if (sb.wins !== sa.wins) return sb.wins - sa.wins;
    return sa.losses - sb.losses;
  });

  html += `<table class="standings-table" style="margin-bottom:1.5rem">
    <thead><tr>
      <th style="width:40px">名次</th>
      <th>選手</th>
      <th>勝 / 敗</th>
      <th>狀態</th>
    </tr></thead><tbody>`;

  sorted.forEach((p, i) => {
    const st = s.standings[p];
    const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    html += `<tr class="${cls}">
      <td style="font-weight:800">#${i+1}</td>
      <td>${p}</td>
      <td class="record"><span class="w">${st.wins}W</span> <span style="color:var(--muted)">/</span> <span class="l">${st.losses}L</span></td>
      <td>${st.eliminated ? '<span class="eliminated-tag">已淘汰</span>' : '<span class="active-tag">進行中</span>'}</td>
    </tr>`;
  });

  html += `</tbody></table>`;

  // Rounds
  html += `<div class="swiss-wrap">`;
  s.rounds.forEach((round, ri) => {
    const allDone = round.every(m => m.winner);
    html += `<div class="round-section">
      <div class="round-header">
        <div class="round-title">第 ${ri+1} 輪</div>
        <span style="font-size:0.78rem;color:${allDone ? 'var(--win)' : 'var(--muted)'}">
          ${allDone ? '✓ 已完成' : `${round.filter(m=>m.winner).length}/${round.length} 完成`}
        </span>
      </div>
      <table class="match-table">
        <thead><tr><th>#</th><th>選手 A</th><th></th><th>選手 B</th><th>結果</th></tr></thead>
        <tbody>`;

    round.forEach((match, mi) => {
      const aWin = match.winner === match.a;
      const bWin = match.winner === match.b;
      const bye = match.bye;
      const sa = match.scoreA || 0;
      const sb = match.scoreB || 0;
      html += `<tr>
        <td style="color:var(--muted);font-size:0.8rem">${mi+1}</td>
        <td style="font-weight:${aWin?'700':'400'};color:${aWin?'var(--win)':'var(--text)'}">
          ${match.a}
          ${!match.winner && !bye ? `<span style="font-size:0.82rem;color:${sa>0?'var(--accent)':'var(--muted)'};font-weight:700;margin-left:4px">${sa}分</span>` : ''}
        </td>
        <td>
          ${match.winner
            ? `<span style="font-size:0.82rem;color:var(--win);font-weight:700">🏅 ${match.winner}${bye ? ' (輪空)' : ''}<br><span style="color:var(--muted);font-size:0.75rem">${sa} : ${sb}</span></span>`
            : bye ? '' : `<div style="display:flex;flex-direction:column;gap:3px;align-items:center">
                <span class="vs-badge">VS</span>
                <button class="sc-btn sc-reset" onclick="resetScore('swiss',${ri},${mi})" style="font-size:0.7rem;padding:1px 5px">↺</button>
              </div>`
          }
        </td>
        <td style="font-weight:${bWin?'700':'400'};color:${bWin?'var(--win)':bye?'var(--muted)':'var(--text)'}">
          ${match.b}
          ${!match.winner && !bye ? `<span style="font-size:0.82rem;color:${sb>0?'var(--accent)':'var(--muted)'};font-weight:700;margin-left:4px">${sb}分</span>` : ''}
        </td>
        <td>
          ${match.winner
            ? ''
            : bye ? '' : `<div style="display:flex;gap:3px;flex-wrap:wrap">
                <div style="display:flex;gap:2px;align-items:center">
                  <span style="font-size:0.7rem;color:var(--muted);min-width:16px;font-weight:700">${match.a}:</span>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'a',1)">+1</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'a',2)">+2</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'a',3)">+3</button>
                </div>
                <div style="display:flex;gap:2px;align-items:center;margin-top:2px">
                  <span style="font-size:0.7rem;color:var(--muted);min-width:16px;font-weight:700">${match.b}:</span>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'b',1)">+1</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'b',2)">+2</button>
                  <button class="sc-btn" onclick="addScore('swiss',${ri},${mi},'b',3)">+3</button>
                </div>
              </div>`
          }
        </td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}
